<div
  class="drop-zone"
  [class.dragging]="isDragging"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
  (drop)="onDrop($event)"
>
  @if (selectedFile()) {
    <div class="file-info">
      <span class="file-icon">📄</span>
      <span class="file-name">{{ selectedFile()!.name }}</span>
      <span class="file-size">{{ (selectedFile()!.size / 1024).toFixed(1) }} KB</span>
    </div>
  } @else {
    <div class="drop-hint">
      <span class="drop-icon">📁</span>
      <p>Drop STL file here</p>
      <p class="sub">or</p>
    </div>
  }

  <label class="btn-upload">
    Browse File
    <input
      type="file"
      accept=".stl,.obj,.3mf,model/stl,model/obj,model/3mf,application/vnd.ms-pki.stl,application/sla,application/vnd.ms-package.3dmanufacturing-3dmodel+xml,application/octet-stream"
      (change)="onFileInput($event)"
      hidden
    />
  </label>
</div>
