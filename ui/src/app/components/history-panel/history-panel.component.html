<div class="history-panel">
  <div class="history-header">
    <h3>Previous Sessions</h3>
    <button class="refresh-btn" (click)="loadHistory()" title="Refresh session list">
      ↻ Refresh
    </button>
  </div>

  <div *ngIf="previousSessions().length === 0" class="empty-state">
    <p>No previous sessions found.</p>
  </div>

  <div *ngIf="previousSessions().length > 0" class="sessions-list">
    <div *ngFor="let session of previousSessions()" class="session-item">
      <div class="session-info">
        <div class="filename">{{ getFilename(session) }}</div>
        <div class="metadata">
          <span class="date">{{ formatDate(session.created_at) }}</span>
          <span *ngIf="session.layer_count" class="layers">{{ session.layer_count }} layers</span>
        </div>
      </div>
      <div class="session-actions">
        <button class="view-debug-btn" (click)="viewDebug(session)" title="View layer visualization">
          👁 View Debug
        </button>
        <button class="download-btn" (click)="downloadSession(session)" title="Download G-code">
          ⬇ Download
        </button>
      </div>
    </div>
  </div>
</div>
