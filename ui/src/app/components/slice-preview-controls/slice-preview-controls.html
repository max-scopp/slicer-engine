@if (preview.gcodeHandle() !== null) {
  <nexus-card visualSize="large" (pointerdown)="$event.stopPropagation()">
    <!-- ── Header: layer label + mode toggle ── -->
    <div class="controls-header">
      <span class="layer-label">{{ layerRangeLabel() }}</span>

      @if (currentZ() !== null) {
        <span class="z-label">Z&thinsp;{{ currentZ()! | number: '1.2-2' }}&thinsp;mm</span>
      }

      <button
        type="button"
        class="mode-toggle"
        [class.active]="preview.isProgressMode()"
        (click)="toggleProgressMode()"
        [title]="preview.isProgressMode() ? 'Switch to range mode' : 'Switch to single-layer mode'"
      >
        @if (preview.isProgressMode()) {
          <!-- single thumb icon -->
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <rect x="2" y="10" width="20" height="4" rx="2" />
            <circle cx="8" cy="12" r="3" fill="currentColor" stroke="none" />
          </svg>
        } @else {
          <!-- dual thumb icon -->
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <rect x="2" y="10" width="20" height="4" rx="2" />
            <circle cx="7" cy="12" r="3" fill="currentColor" stroke="none" />
            <circle cx="17" cy="12" r="3" fill="currentColor" stroke="none" />
          </svg>
        }
      </button>
    </div>

    <!-- ── Layer slider ── -->
    <div class="slider-row">
      @if (preview.isProgressMode()) {
        <!-- Single-layer mode: one thumb, layerMin === layerMax -->
        <div class="range-slider" (wheel)="onWheelLayer($event)">
          <div class="range-track-fill" [style.left.%]="0" [style.right.%]="fillRight()"></div>
          <input
            type="range"
            class="thumb thumb-max"
            min="0"
            [max]="preview.layerCount() - 1"
            [value]="preview.layerMax()"
            (input)="onLayerMaxInput($event)"
          />
        </div>
      } @else {
        <!-- Range mode: dual thumbs -->
        <div class="range-slider" (wheel)="onWheelLayer($event)">
          <div
            class="range-track-fill"
            [style.left.%]="fillLeft()"
            [style.right.%]="fillRight()"
          ></div>
          <input
            type="range"
            class="thumb thumb-min"
            min="0"
            [max]="preview.layerCount() - 1"
            [value]="preview.layerMin()"
            (input)="onLayerMinInput($event)"
          />
          <input
            type="range"
            class="thumb thumb-max"
            min="0"
            [max]="preview.layerCount() - 1"
            [value]="preview.layerMax()"
            (input)="onLayerMaxInput($event)"
          />
        </div>
      }
    </div>

    <!-- ── Nozzle scrub slider — always visible ── -->
    <input
      type="range"
      min="0"
      [max]="layerSegmentCount()"
      [value]="segmentSliderValue()"
      (input)="onSegmentInput($event)"
      (wheel)="onWheelSegment($event)"
    />

    <!-- ── Role legend ── -->
    <div class="legend">
      @for (role of roleOrder; track role) {
        <button
          type="button"
          class="role-badge"
          [class.hidden]="preview.hiddenRoles().has(role)"
          [style.--role-color]="roleCss()[role]"
          (click)="toggleRole(role)"
          [title]="(preview.hiddenRoles().has(role) ? 'Show ' : 'Hide ') + roleLabels[role]"
        >
          <span class="role-swatch"></span>
          <span class="role-name">{{ roleLabels[role] }}</span>
        </button>
      }
    </div>
  </nexus-card>
}
