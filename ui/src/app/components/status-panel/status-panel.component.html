<section class="status-panel">
  <div class="status-row">
    <span class="badge" [attr.data-status]="status()">{{ status() }}</span>

    <div class="actions">
      <button
        class="btn-slice"
        [disabled]="!selectedFile() || status() === 'slicing'"
        (click)="slice()"
      >
        @if (status() === 'slicing') {
          Slicing…
        } @else {
          Slice
        }
      </button>

      @if (status() === 'done' || status() === 'error') {
        <button class="btn-reset" (click)="reset()">Reset</button>
      }
    </div>
  </div>

  <div class="log-header">
    <label class="auto-scroll-checkbox">
      <input type="checkbox" [(ngModel)]="autoScroll" />
      <span>Always scroll to bottom</span>
    </label>
  </div>

  <div class="log" #logContainer>
    @if (outputLog().length === 0) {
      <span class="log-empty">No output yet.</span>
    } @else {
      @for (line of outputLog(); track $index) {
        <div class="log-line">{{ line }}</div>
      }
    }
  </div>
</section>
