<section class="settings-panel">
  <h2>Slice Settings</h2>

  <div class="field">
    <label for="layerHeight">Layer Height (mm)</label>
    <input
      id="layerHeight"
      type="number"
      step="0.05"
      min="0.05"
      max="0.5"
      [value]="settings().layerHeight"
      (change)="update({ layerHeight: +$any($event.target).value })"
    />
  </div>

  <div class="field">
    <label for="printSpeed">Print Speed (mm/s)</label>
    <input
      id="printSpeed"
      type="number"
      step="5"
      min="10"
      max="300"
      [value]="settings().printSpeed"
      (change)="update({ printSpeed: +$any($event.target).value })"
    />
  </div>

  <div class="field">
    <label for="nozzleTemp">Nozzle Temp (°C)</label>
    <input
      id="nozzleTemp"
      type="number"
      step="5"
      min="150"
      max="300"
      [value]="settings().nozzleTemp"
      (change)="update({ nozzleTemp: +$any($event.target).value })"
    />
  </div>

  <div class="field">
    <label for="bedTemp">Bed Temp (°C)</label>
    <input
      id="bedTemp"
      type="number"
      step="5"
      min="0"
      max="120"
      [value]="settings().bedTemp"
      (change)="update({ bedTemp: +$any($event.target).value })"
    />
  </div>

  <div class="field">
    <label for="gcodeFlavor">GCode Flavor</label>
    <select
      id="gcodeFlavor"
      [value]="settings().gcodeFlavor"
      (change)="update({ gcodeFlavor: $any($event.target).value })"
    >
      <option value="marlin">Marlin</option>
      <option value="klipper">Klipper</option>
    </select>
  </div>

  <div class="section-divider">
    <span>Infill</span>
  </div>

  <div class="field">
    <label for="infillPattern">Infill Pattern</label>
    <select
      id="infillPattern"
      [value]="settings().infillPattern"
      (change)="update({ infillPattern: $any($event.target).value })"
    >
      <option value="rectilinear">Rectilinear</option>
      <option value="grid">Grid</option>
      <option value="honeycomb">Honeycomb</option>
      <option value="gyroid">Gyroid</option>
    </select>
  </div>

  <div class="field">
    <label for="infillDensity">Infill Density ({{ settings().infillDensity }}%)</label>
    <input
      id="infillDensity"
      type="range"
      min="0"
      max="100"
      step="5"
      [value]="settings().infillDensity"
      (input)="update({ infillDensity: +$any($event.target).value })"
    />
    <div class="range-labels">
      <span>0%</span>
      <span>50%</span>
      <span>100%</span>
    </div>
  </div>

  <div class="field">
    <label for="infillAngle">Infill Angle (°)</label>
    <input
      id="infillAngle"
      type="number"
      step="15"
      min="0"
      max="180"
      [value]="settings().infillAngle"
      (change)="update({ infillAngle: +$any($event.target).value })"
    />
  </div>
</section>
