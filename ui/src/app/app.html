<div class="app-shell">
  <header class="app-header">
    <h1>{{ title() }}</h1>
    <span class="subtitle">High-performance 3D model slicer</span>
  </header>

  <main class="app-content">
    <section class="panel model-section">
      <h2 class="panel-title">Model</h2>
      <app-file-upload />
    </section>

    <section class="middle-panel">
      <section class="panel">
        <h2 class="panel-title">Output</h2>
        <app-status-panel />
      </section>

      <section class="panel">
        <app-history-panel />
      </section>
    </section>

    <section class="panel settings-section">
      <app-settings-panel />
    </section>

    <section class="panel debug-section">
      <app-debug-viewer />
    </section>
  </main>
</div>
