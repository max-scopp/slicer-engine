<nexus-card visualSize="large">
  <div class="card-header">
    <h3>Print Estimates</h3>
    <span class="status-badge" [class.ready]="estimates().status === 'ready'">
      {{ estimates().status === 'ready' ? '✓ Ready' : '⚠ Modified' }}
    </span>
  </div>

  <div class="estimates-grid">
    <div class="estimate-item">
      <div class="label">Time</div>
      <div class="value">{{ estimates().time }}</div>
    </div>

    <div class="estimate-item">
      <div class="label">Material</div>
      <div class="value">
        {{ estimates().material }}
        @if (estimates().materialDelta) {
          <span class="delta">{{ estimates().materialDelta }}</span>
        }
      </div>
    </div>

    <div class="estimate-item">
      <div class="label">Cost</div>
      <div class="value">{{ estimates().cost }}</div>
    </div>

    <div class="estimate-item">
      <div class="label">Layers</div>
      <div class="value">{{ estimates().layers }}</div>
    </div>
  </div>
</nexus-card>
