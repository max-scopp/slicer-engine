<div class="sidebar-header">
  <nexus-logo routerLink="/" [hideProductName]="!isExpanded()" />

  <div class="sidebar-header-actions">
    @if (isExpanded()) {
      <nexus-connection-state />
    }
  </div>
</div>

<div class="sidebar-content">
  @if (isExpanded()) {
    <div class="sidebar-content-inner">
      <ng-content />
    </div>
  }
</div>

<div class="sidebar-footer">
  @if (isExpanded()) {
    <button
      class="sidebar-footer-btn"
      type="button"
      [attr.aria-label]="_theme.isDarkMode() ? 'Switch to light theme' : 'Switch to dark theme'"
      (click)="_theme.toggleTheme()"
    >
      <nexus-icon [name]="_theme.isDarkMode() ? 'sun-light' : 'half-moon'" />
    </button>

    <span class="sidebar-footer-spacer"></span>
  }

  <button
    class="sidebar-footer-btn"
    type="button"
    [attr.aria-label]="collapsed() ? 'Expand sidebar' : 'Collapse sidebar'"
    (click)="onCollapseToggle($event)"
  >
    @if (collapsed() && !isExpanded()) {
      <nexus-icon name="nav-arrow-right" />
    } @else if (collapsed() && isExpanded()) {
      <nexus-icon name="nav-arrow-right" />
    } @else {
      <nexus-icon name="nav-arrow-left" />
    }
  </button>
</div>

<div class="resize-handle" aria-hidden="true" (mousedown)="onResizeStart($event)"></div>
