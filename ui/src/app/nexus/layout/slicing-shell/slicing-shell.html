<nexus-sidebar>
  <nexus-settings-panel />
</nexus-sidebar>

<main class="shell-content">
  <nexus-3d-view-toolbar class="shell-toolbar" />

  <nexus-viewport-cube class="viewport-cube" />

  <router-outlet></router-outlet>

  <nexus-print-estimates class="print-estimates" />
</main>

@if (editorPanelVisible()) {
  <nexus-card class="code-editor-panel" visualSize="large">
    <nexus-code-editor [content]="snapshotJson()" language="json" [readOnly]="true" />
  </nexus-card>
}
