<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SlicerUi</title>
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Prevent flashbang: paint correct theme background before app boots */
      html,
      body {
        margin: 0;
        background-color: #f4f5f8;
        color: #111214;
      }
      html.dark,
      html.dark body {
        background-color: #111214;
        color: #e8e9ee;
      }
    </style>
    <script>
      // Set the theme class synchronously before first paint to avoid a
      // light->dark flash. Mirrors the logic in AppTheme.getInitialTheme().
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var isDark = stored
            ? stored === 'dark'
            : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (isDark) {
            document.documentElement.classList.add('dark');
          }
        } catch (_) {
          /* localStorage unavailable — fall through */
        }
      })();

      // iOS Safari ignores `user-scalable=no` in the viewport meta since
      // iOS 10. Block pinch-zoom (gesture events) and double-tap zoom
      // explicitly. Allow multi-touch inside elements that opt in via
      // `data-allow-gesture` (e.g. the 3D viewer canvas if it ever needs it).
      (function () {
        var allow = function (target) {
          return target && target.closest && target.closest('[data-allow-gesture]');
        };
        ['gesturestart', 'gesturechange', 'gestureend'].forEach(function (evt) {
          document.addEventListener(
            evt,
            function (e) {
              if (!allow(e.target)) e.preventDefault();
            },
            { passive: false },
          );
        });
        document.addEventListener(
          'touchmove',
          function (e) {
            if (e.touches && e.touches.length > 1 && !allow(e.target)) {
              e.preventDefault();
            }
          },
          { passive: false },
        );
        // Suppress double-tap zoom (iOS triggers it within ~300ms of a tap).
        var lastTouchEnd = 0;
        document.addEventListener(
          'touchend',
          function (e) {
            var now = Date.now();
            if (now - lastTouchEnd <= 300 && !allow(e.target)) {
              e.preventDefault();
            }
            lastTouchEnd = now;
          },
          { passive: false },
        );
      })();
    </script>
  </head>
  <body>
    <nexus-root></nexus-root>
  </body>
</html>
