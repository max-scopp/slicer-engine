<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SlicerUi</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Prevent flashbang: paint correct theme background before app boots */
      html,
      body {
        margin: 0;
        background-color: #f4f5f8;
        color: #111214;
      }
      html.dark,
      html.dark body {
        background-color: #111214;
        color: #e8e9ee;
      }
    </style>
    <script>
      // Set the theme class synchronously before first paint to avoid a
      // light->dark flash. Mirrors the logic in AppTheme.getInitialTheme().
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var isDark = stored
            ? stored === 'dark'
            : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (isDark) {
            document.documentElement.classList.add('dark');
          }
        } catch (_) {
          /* localStorage unavailable — fall through */
        }
      })();
    </script>
  </head>
  <body>
    <nexus-root></nexus-root>
  </body>
</html>
